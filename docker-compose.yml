services:
  postgres:
    image: postgres:17-alpine
    container_name: staffsearch-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: staffsearch
      POSTGRES_PASSWORD: staffsearch
      POSTGRES_DB: staffsearch
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U staffsearch -d staffsearch"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: staffsearch-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  redis_data:
